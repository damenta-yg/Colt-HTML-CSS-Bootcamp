<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Course Landing Page</title>
    <style>
      div {
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Your Course Landing Page</h1>
    <form action="/clp">
      <div id="course">
        <label for="courseTitle">Course Title</label>
        <input type="text" id="courseTitle" name="courseTitle" />
      </div>
      <div>
        <label for="courseDescription">Course Description</label>
        <br />
        <textarea
          name="courseDescription"
          id="courseDescription"
          cols="31"
          rows="10"
        ></textarea>
      </div>

      <div>
        <label for="skillLevel">Skill Level</label>
        <select name="skillLevel" id="skillLevel">
          <option value="beginner">Beginner Level</option>
          <option value="intermediate">Intermediate Level</option>
          <option value="expert">Expert Level</option>
          <option value="all">All Level</option>
        </select>
      </div>

      <div>
        <label for="publish">Ready to publish the course?</label>
        <input type="checkbox" name="publish" id="publish" />
      </div>
      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
  </body>
</html>
